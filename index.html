<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>EV·LYD — motorlyd til din elbil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Audiowide&family=Chakra+Petch:wght@500;600;700&family=Oswald:wght@500;600&family=Playfair+Display:wght@600;700&family=Saira+Stencil+One&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0D0C0A; --panel:#17150F; --line:#2A251C;
    --accent:#D8D3C8; --accent-contrast:#141210; --needle:#E03A2F; --red:#E03A2F;
    --dim:#7E7A6F; --fg:#F2EFE7;
    --gauge-fg:var(--fg); --gauge-dim:var(--dim);
    --font:'Oswald'; --vig:.38;
    --bgimg:linear-gradient(#0D0C0A,#0D0C0A);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bgimg) fixed, var(--bg); color:var(--fg);
    font-family:var(--font),'Chakra Petch',system-ui,sans-serif;
    display:flex;flex-direction:column;height:100dvh;
    padding:max(10px,env(safe-area-inset-top)) 14px max(14px,env(safe-area-inset-bottom));
    overflow:hidden;user-select:none;-webkit-user-select:none;transition:color .25s;
  }
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(circle at 50% 28%, transparent 30%, rgba(0,0,0,var(--vig)) 100%);}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;display:none}
  body[data-p="warp"] #stars{display:block}
  header,main,.controls{position:relative;z-index:1}

  header{display:flex;flex-direction:column;gap:8px;padding:2px 0 8px}
  .topline{display:flex;align-items:center;justify-content:space-between}
  .wordmark{font-weight:700;letter-spacing:.18em;font-size:15px}
  .wordmark span{color:var(--accent)}
  .badge{font-size:9.5px;letter-spacing:.14em;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:3px 8px}
  .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;display:flex;align-items:center;gap:6px;font-family:inherit;font-weight:600;
    font-size:12px;letter-spacing:.07em;color:var(--dim);background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:8px 13px;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap}
  .chip::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--c);opacity:.9}
  .chip.active{color:var(--fg);border-color:var(--c)}
  .chip .real{font-size:8.5px;letter-spacing:.1em;opacity:.7;margin-left:1px}

  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0}
  .gauge-wrap{position:relative;width:min(92vw,44dvh,420px);transition:opacity .18s}
  .gauge-wrap.swap{opacity:0}
  svg{display:block;width:100%;height:auto}
  .tick-label{font-family:var(--font),sans-serif;font-size:11px;font-weight:600}
  #abBadge{display:none;position:absolute;top:14%;right:6%;font-size:12px;font-weight:700;letter-spacing:.14em;
    color:var(--red);border:1.5px solid var(--red);border-radius:6px;padding:3px 7px;opacity:.15;transition:opacity .2s}
  body[data-p="jet"] #abBadge{display:block}
  #abBadge.on{opacity:1;text-shadow:0 0 10px var(--red)}

  .center-read{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;pointer-events:none;padding-top:8%}
  #speed{font-size:clamp(50px,16vw,82px);font-weight:700;line-height:1;font-variant-numeric:tabular-nums;color:var(--gauge-fg);transition:color .12s}
  #speed.over{color:var(--red)}
  .unit{color:var(--gauge-dim);font-size:13px;letter-spacing:.22em;margin-top:2px}
  #subread{color:var(--gauge-dim);font-size:13px;letter-spacing:.06em;margin-top:9px;font-variant-numeric:tabular-nums}
  #subread b{color:var(--gauge-fg);font-weight:600;display:inline-block}
  #subread.bump b{animation:bump .18s ease-out}
  @keyframes bump{40%{transform:scale(1.25)}}

  #status{color:var(--dim);font-size:12px;text-align:center;min-height:16px;margin-top:2px}
  #status.err{color:var(--red)}
  #status.ok::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;
    background:#2ECC40;margin-right:6px;animation:blink 1.6s infinite}
  @keyframes blink{50%{opacity:.25}}

  .controls{display:flex;flex-direction:column;gap:11px;padding-top:8px}
  .row{display:flex;align-items:center;gap:12px}
  #whistleBtn{display:none;font-family:inherit;font-weight:600;font-size:13px;letter-spacing:.16em;
    padding:12px;border-radius:12px;cursor:pointer;background:var(--panel);color:var(--accent);border:1px solid var(--accent)}
  body[data-p="damp"] #whistleBtn{display:block}
  #whistleBtn:active{background:var(--accent);color:var(--accent-contrast)}
  .toggle{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .toggle button{font-family:inherit;font-weight:600;font-size:12px;letter-spacing:.1em;background:none;border:0;
    color:var(--dim);padding:10px 15px;cursor:pointer}
  .toggle button.active{background:var(--line);color:var(--fg)}
  .slider-row{flex:1;display:flex;align-items:center;gap:10px}
  .slider-row label{font-size:11px;letter-spacing:.1em;color:var(--dim);white-space:nowrap}
  input[type=range]{flex:1;appearance:none;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--line);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--fg);border:none;cursor:pointer}
  #demoRow{display:none}
  body.demo #demoRow{display:flex}
  #startBtn{font-family:inherit;font-weight:700;font-size:17px;letter-spacing:.24em;padding:16px;border-radius:14px;
    border:0;cursor:pointer;background:var(--accent);color:var(--accent-contrast);transition:background .15s}
  #startBtn:not(.running):not(.busy){animation:breathe 2.6s ease-in-out infinite}
  @keyframes breathe{50%{box-shadow:0 0 22px -2px var(--accent)}}
  #startBtn.running{background:var(--panel);color:var(--red);border:1px solid var(--red);animation:none}
  #startBtn.busy{opacity:.6;animation:none}
  .hint{color:var(--dim);font-size:11px;text-align:center;letter-spacing:.02em}
  @media (prefers-reduced-motion: reduce){#startBtn{animation:none !important}}
</style>
</head>
<body class="demo" data-p="v8">

<canvas id="stars"></canvas>

<header>
  <div class="topline"><div class="wordmark">EV<span>·</span>LYD</div><div class="badge">ÆGTE MOTORLYD</div></div>
  <div class="chips" id="chips">
    <button class="chip active" data-p="v8" style="--c:#D8D3C8">V8 <span class="real">● ÆGTE</span></button>
    <button class="chip" data-p="diesel" style="--c:#F5872B">DIESEL <span class="real">● ÆGTE</span></button>
    <button class="chip" data-p="jet" style="--c:#35FF6D">JET</button>
    <button class="chip" data-p="warp" style="--c:#9B5CFF">WARP</button>
    <button class="chip" data-p="damp" style="--c:#C9A24B">DAMP</button>
  </div>
</header>

<main>
  <div class="gauge-wrap" id="gaugeWrap">
    <svg viewBox="0 0 240 222" id="tach" aria-hidden="true"></svg>
    <div id="abBadge">AB</div>
    <div class="center-read">
      <div id="speed">0</div>
      <div class="unit">KM/T</div>
      <div id="subread"></div>
    </div>
  </div>
  <div id="status"></div>
</main>

<section class="controls">
  <button id="whistleBtn">HOLD FOR FLØJTE</button>
  <div class="row" id="demoRow">
    <div class="slider-row"><label>DEMO-FART</label><input type="range" id="demoSpeed" min="0" max="160" value="0" step="1"></div>
  </div>
  <div class="row">
    <div class="toggle" id="modeToggle"><button data-m="demo" class="active">DEMO</button><button data-m="gps">GPS</button></div>
    <div class="slider-row"><label>LYD</label><input type="range" id="vol" min="0" max="100" value="75"></div>
  </div>
  <button id="startBtn">START MOTOR</button>
  <div class="hint">Hold skærmen tændt under kørsel — browseren pauser lyd og GPS i baggrunden.</div>
</section>

/* ================= AUDIO-KERNE (ingen AudioWorklet → maks. kompatibilitet) ================= */
let ctx = null, comp = null, userGain = null, runGain = null;
let engine = null, running = false, busy = false, presetKey = 'v8';
const SAMPLE_CACHE = {};   // afkodede AudioBuffers pr. profil

function baseCtx(){
  if (ctx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  ctx = new AC();
  comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -12; comp.ratio.value = 4; comp.knee.value = 12;
  userGain = ctx.createGain();
  userGain.gain.value = document.getElementById('vol').value / 100;
  runGain = ctx.createGain(); runGain.gain.value = 0;
  runGain.connect(userGain); userGain.connect(comp); comp.connect(ctx.destination);
}

function b64ToBuf(b64){
  const bin = atob(b64); const len = bin.length; const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
// decodeAudioData → Promise (også paa aeldre Safari via callback-form)
function decode(arrbuf){
  return new Promise((res, rej) => {
    const p = ctx.decodeAudioData(arrbuf, res, rej);
    if (p && p.then) p.then(res, rej);
  });
}
async function ensureSamples(key){
  if (SAMPLE_CACHE[key] || !SAMPLE_ASSETS[key]) return;
  const layers = SAMPLE_ASSETS[key];
  const bufs = [];
  for (const l of layers){
    const buf = await decode(b64ToBuf(l.d));
    bufs.push({buffer: buf, native: l.n});
  }
  SAMPLE_CACHE[key] = bufs;
}

let noiseBuf = null;
function noiseSource(){
  if (!noiseBuf){
    noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  }
  const s = ctx.createBufferSource(); s.buffer = noiseBuf; s.loop = true; s.start(); return s;
}
function mkGain(v){ const g = ctx.createGain(); g.gain.value = v; return g; }
function mkOsc(type, f){ const o = ctx.createOscillator(); o.type = type; o.frequency.value = f; o.start(); return o; }
function mkFilter(type, f, q){ const b = ctx.createBiquadFilter(); b.type = type; b.frequency.value = f; if (q) b.Q.value = q; return b; }
function pop(out, o){
  const src = noiseSource(); const f = mkFilter(o.type || 'bandpass', o.fc, o.q || 1);
  const g = ctx.createGain(); const t = ctx.currentTime;
  g.gain.setValueAtTime(o.g, t); g.gain.exponentialRampToValueAtTime(0.001, t + o.dur);
  src.connect(f); f.connect(g); g.connect(out); src.stop(t + o.dur + 0.05);
}

/* ---------- SAMPLE-MOTOR: rigtige optagelser, loopet + crossfadet + pitch-shiftet ---------- */
function buildSampleEngine(out, key, cfg){
  const bufs = SAMPLE_CACHE[key];
  const master = mkGain(0); master.connect(out);
  // let load-styret lowpass: cruise → lidt moerkere/blødere, gas → helt aaben
  const lp = mkFilter('lowpass', 18000, 0.7); lp.connect(master);
  const layers = bufs.map((b, i) => {
    const src = ctx.createBufferSource(); src.buffer = b.buffer; src.loop = true;
    const g = mkGain(i === 0 ? 1 : 0);
    src.connect(g); g.connect(lp); src.start();
    return {src, g, native: b.native};
  });
  const logn = layers.map(l => Math.log(l.native));
  master.gain.setTargetAtTime(1, ctx.currentTime, cfg.fadeIn || 0.12);

  return {
    kind: 'sample',
    update(s){
      const t = ctx.currentTime;
      const rpm = Math.max(1, s.rpm);
      const lr = Math.log(rpm);
      // find bracket + equal-power crossfade
      let gains = layers.map(() => 0);
      if (lr <= logn[0]) gains[0] = 1;
      else if (lr >= logn[logn.length - 1]) gains[layers.length - 1] = 1;
      else {
        let k = 0; while (k < logn.length - 2 && lr > logn[k + 1]) k++;
        const f = (lr - logn[k]) / (logn[k + 1] - logn[k]);
        gains[k] = Math.sqrt(1 - f); gains[k + 1] = Math.sqrt(f);
      }
      for (let i = 0; i < layers.length; i++){
        const L = layers[i];
        L.g.gain.setTargetAtTime(gains[i], t, 0.05);
        if (gains[i] > 0.001)
          L.src.playbackRate.setTargetAtTime(Math.min(2.6, Math.max(0.4, rpm / L.native)), t, 0.04);
      }
      // load: cruise (lav gas) dulmer let, gas aabner helt
      lp.frequency.setTargetAtTime(2600 + s.thr * 15000, t, 0.08);
      master.gain.setTargetAtTime(0.7 + s.thr * 0.5, t, 0.1);
    },
    setMaster(v, tc){ master.gain.setTargetAtTime(v, ctx.currentTime, tc); },
    teardown(){
      layers.forEach(L => { try { L.src.stop(ctx.currentTime + 0.35); } catch(e){} });
    }
  };
}

/* ---------- SYNTETISKE lyde (jet / warp / damp) ---------- */
function buildJet(out){
  const stops = []; let ab = 0;
  const g = mkGain(0.6); g.connect(out);
  const ns1 = noiseSource(); stops.push(ns1);
  const bp = mkFilter('bandpass', 220, 0.9); const g1 = mkGain(0.4);
  ns1.connect(bp); bp.connect(g1); g1.connect(g);
  const ns2 = noiseSource(); stops.push(ns2);
  const hp = mkFilter('highpass', 3200); const g2 = mkGain(0);
  ns2.connect(hp); hp.connect(g2); g2.connect(g);
  const whine = mkOsc('sawtooth', 700); stops.push(whine);
  const wf = mkFilter('bandpass', 700, 9); const g3 = mkGain(0.03);
  whine.connect(wf); wf.connect(g3); g3.connect(g);
  const ns3 = noiseSource(); stops.push(ns3);
  const af = mkFilter('lowpass', 170); const agn = mkGain(0);
  ns3.connect(af); af.connect(agn); agn.connect(g);
  return {
    kind: 'jet', getAB(){ return ab; },
    update(s){
      const t = ctx.currentTime;
      const abT = s.thr > 0.72 && s.spool > 0.25 ? 1 : 0;
      ab += (abT - ab) * Math.min(1, s.dt * 1.4);
      bp.frequency.setTargetAtTime(200 + s.spool * 2100, t, .12);
      g1.gain.setTargetAtTime(0.3 + s.spool * 0.38 + s.thr * 0.1, t, .15);
      g2.gain.setTargetAtTime(s.spool * 0.2, t, .15);
      const whz = 650 + s.spool * 4300;
      whine.frequency.setTargetAtTime(whz, t, .15); wf.frequency.setTargetAtTime(whz, t, .15);
      g3.gain.setTargetAtTime(0.02 + s.spool * 0.07, t, .15);
      agn.gain.setTargetAtTime(ab * 0.5, t, .15);
      if (ab > 0.4 && Math.random() < s.dt * 12) pop(g, {fc: 90 + Math.random() * 90, q: .8, g: .25, dur: .06});
    },
    setMaster(){}, teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}
function buildWarp(out){
  const stops = []; const g = mkGain(0.45); g.connect(out);
  const lp = mkFilter('lowpass', 500, 2.5); lp.connect(g);
  const oscs = [];
  for (const [mult, type, vol] of [[1,'triangle',.45],[1.006,'triangle',.4],[0.5,'sine',.5]]){
    const o = mkOsc(type, 60 * mult); const og = mkGain(vol); o.connect(og); og.connect(lp);
    oscs.push({o, mult}); stops.push(o);
  }
  const lfo = mkOsc('sine', 0.13); stops.push(lfo);
  const lfoG = mkGain(220); lfo.connect(lfoG); lfoG.connect(lp.frequency);
  const ns = noiseSource(); stops.push(ns);
  const hp = mkFilter('highpass', 5600); const sg = mkGain(0.012);
  ns.connect(hp); hp.connect(sg); sg.connect(g);
  return {
    kind: 'warp',
    update(s){
      const t = ctx.currentTime; const f = 52 + s.spool * 330;
      for (const {o, mult} of oscs) o.frequency.setTargetAtTime(f * mult, t, .12);
      lp.frequency.setTargetAtTime(320 + s.spool * 2600 + s.thr * 500, t, .12);
      sg.gain.setTargetAtTime(0.01 + s.spool * 0.05, t, .2);
      g.gain.setTargetAtTime(0.32 + s.spool * 0.28, t, .15);
    },
    setMaster(){}, teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}
function buildDamp(out){
  const stops = []; let phase = 0; const g = mkGain(0.7); g.connect(out);
  const ns1 = noiseSource(); stops.push(ns1);
  const hf = mkFilter('lowpass', 5500); const hg = mkGain(0.018);
  ns1.connect(hf); hf.connect(hg); hg.connect(g);
  const ns2 = noiseSource(); stops.push(ns2);
  const rf = mkFilter('lowpass', 140); const rg = mkGain(0);
  ns2.connect(rf); rf.connect(rg); rg.connect(g);
  return {
    kind: 'damp',
    update(s){
      const t = ctx.currentTime; const n = Math.min(1, s.speed / 150);
      const rate = Math.min(10, 0.7 + s.speed * 0.11);
      phase += rate * s.dt;
      if (phase >= 1){ phase %= 1; pop(g, {fc: 280 + Math.random() * 180, q: 1.1, g: .5, dur: Math.min(.5, .7 / rate)}); }
      hg.gain.setTargetAtTime(0.014 + n * 0.04, t, .2);
      rg.gain.setTargetAtTime(n * 0.24, t, .2);
    },
    setMaster(){}, teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

            needle:'#4DE1FF', red:'#FF4D9D', dim:'#7E6FA8', fg:'#EDE6FF', tick:'#6E5A9E', font:"'Audiowide'",
            bgimg:'radial-gradient(circle at 50% 30%,#140A2E,#060310 85%)'}
  },
  damp: {
    kind: 'damp', build: buildDamp, spoolUp: .5, spoolDown: .8,
    gauge: {max: 10, red: 8.5, step: 1, labelEvery: 2, fmt: v => v},
    theme: {bg:'#1F1712', panel:'#2A211A', line:'#3E3226', accent:'#C9A24B', accentC:'#26180C',
            needle:'#26180C', red:'#8F2B1C', dim:'#C7B08A', fg:'#F1E4C8', tick:'#4A3618', font:"'Playfair Display'",
            face:'#C9A24B', faceHi:'#E2C173', gaugeFg:'#26180C', gaugeDim:'#5C4520', arc:'#A9853A',
            bgimg:'radial-gradient(circle at 50% 18%,#2A1F16,#17110C 85%)'}
  }
};

/* ================= GAUGE (SVG) ================= */
const SVGNS = "http://www.w3.org/2000/svg";
const tach = document.getElementById('tach');
const CX = 120, CY = 118, R = 100, A0 = 150, SWEEP = 240;
let G = null, TH = null, activeArc = null, needle = null, ARCLEN = 0;
function polar(deg, r){ const a = deg * Math.PI / 180; return [CX + r * Math.cos(a), CY + r * Math.sin(a)]; }
function arcPath(d0, d1, r){ const [x0, y0] = polar(d0, r), [x1, y1] = polar(d1, r);
  return `M ${x0} ${y0} A ${r} ${r} 0 ${(d1 - d0) > 180 ? 1 : 0} 1 ${x1} ${y1}`; }
function el(name, attrs){ const e = document.createElementNS(SVGNS, name); for (const k in attrs) e.setAttribute(k, attrs[k]); return e; }
function buildGauge(p){
  const gg = p.gauge, th = p.theme; G = gg; TH = th; tach.innerHTML = '';
  if (th.face){
    const defs = el('defs', {});
    const grad = el('radialGradient', {id: 'faceG', cx: '50%', cy: '38%', r: '75%'});
    grad.appendChild(el('stop', {offset: '0%', 'stop-color': th.faceHi || th.face}));
    grad.appendChild(el('stop', {offset: '100%', 'stop-color': th.face}));
    defs.appendChild(grad); tach.appendChild(defs);
    tach.appendChild(el('circle', {cx: CX, cy: CY, r: 104, fill: 'url(#faceG)'}));
  }
  tach.appendChild(el('path', {d: arcPath(A0, A0 + SWEEP, R), stroke: th.arc || th.line, 'stroke-width': 6, fill: 'none', 'stroke-linecap': 'round'}));
  const redDeg = A0 + SWEEP * (gg.red / gg.max);
  tach.appendChild(el('path', {d: arcPath(redDeg, A0 + SWEEP, R), stroke: th.red, 'stroke-width': 6, fill: 'none', 'stroke-linecap': 'round', opacity: .9}));
  activeArc = el('path', {d: arcPath(A0, A0 + SWEEP, R), stroke: th.accent, 'stroke-width': 6, fill: 'none', 'stroke-linecap': 'round'});
  activeArc.style.filter = `drop-shadow(0 0 5px ${th.accent})`; tach.appendChild(activeArc);
  ARCLEN = activeArc.getTotalLength(); activeArc.setAttribute('stroke-dasharray', `0 ${ARCLEN}`);
  for (let v = 0; v <= gg.max; v += gg.step){
    const deg = A0 + SWEEP * (v / gg.max); const col = v >= gg.red ? th.red : th.tick;
    const [x1, y1] = polar(deg, R - 12), [x2, y2] = polar(deg, R - 4);
    tach.appendChild(el('line', {x1, y1, x2, y2, stroke: col, 'stroke-width': 2}));
    if (v % gg.labelEvery === 0){
      const [tx, ty] = polar(deg, R - 26);
      const t = el('text', {x: tx, y: ty + 4, 'text-anchor': 'middle', class: 'tick-label', fill: col});
      t.textContent = gg.fmt(v); tach.appendChild(t);
    }
  }
  needle = el('line', {x1: CX, y1: CY, x2: CX, y2: CY - 78, stroke: th.needle, 'stroke-width': 3, 'stroke-linecap': 'round'});
  needle.style.filter = `drop-shadow(0 0 4px ${th.needle})`; tach.appendChild(needle);
  tach.appendChild(el('circle', {cx: CX, cy: CY, r: 7, fill: th.panel, stroke: th.dim, 'stroke-width': 2}));
  drawTachN(0);
}
function drawTachN(n){
  n = Math.min(1.015, Math.max(0, n)); const deg = A0 + SWEEP * n;
  const [x2, y2] = polar(deg, R - 22); const [x1, y1] = polar(deg + 180, 14);
  needle.setAttribute('x1', x1); needle.setAttribute('y1', y1); needle.setAttribute('x2', x2); needle.setAttribute('y2', y2);
  activeArc.setAttribute('stroke-dasharray', `${Math.min(1, n) * ARCLEN} ${ARCLEN}`);
}

/* ================= TEMA ================= */
const gaugeWrap = document.getElementById('gaugeWrap');
function applyTheme(key){
  const p = PRESETS[key], th = p.theme; const r = document.documentElement.style;
  r.setProperty('--bg', th.bg); r.setProperty('--panel', th.panel); r.setProperty('--line', th.line);
  r.setProperty('--accent', th.accent); r.setProperty('--accent-contrast', th.accentC);
  r.setProperty('--needle', th.needle); r.setProperty('--red', th.red);
  r.setProperty('--dim', th.dim); r.setProperty('--fg', th.fg);
  r.setProperty('--gauge-fg', th.gaugeFg || th.fg); r.setProperty('--gauge-dim', th.gaugeDim || th.dim);
  r.setProperty('--font', th.font); r.setProperty('--vig', th.vig || '.38');
  r.setProperty('--bgimg', th.bgimg || `linear-gradient(${th.bg},${th.bg})`);
  document.body.dataset.p = key; buildGauge(p);
}

/* ================= SIMULATION ================= */
let gear = 0, rpm = 780, shiftCut = 0, spool = 0, justShifted = false;
let speedTarget = 0, speedSm = 0, prevSpeed = 0, throttle = 0;
let startup = null, shutdown = null;

function stepSim(dt){
  const P = PRESETS[presetKey];
  speedSm += (speedTarget - speedSm) * Math.min(1, dt * 2.2);
  const accel = (speedSm - prevSpeed) / dt; prevSpeed = speedSm;
  const thrRaw = Math.min(1, Math.max(0.1, 0.14 + accel / 12));
  throttle += (thrRaw - throttle) * Math.min(1, dt * 4);

  const gb = P.gears;
  if (gb && startup){
    startup.t += dt;
    if (startup.ph === 'flare'){
      const target = Math.min(gb.idle * P.startFlare, P.gauge.max * .8);
      rpm += (target - rpm) * Math.min(1, dt * 7); throttle = 0.7;
      if (rpm > target * 0.94) startup.ph = 'settle';
    } else {
      rpm += (gb.idle - rpm) * Math.min(1, dt * 2.2);
      throttle = Math.max(0.12, throttle - dt * 1.4);
      if (Math.abs(rpm - gb.idle) < 60) startup = null;
    }
  } else if (gb){
    let target = Math.max(gb.idle, speedSm * gb.ratios[gear]);
    if (target > gb.up && gear < gb.ratios.length - 1){
      gear++; shiftCut = gb.cut; justShifted = true; target = Math.max(gb.idle, speedSm * gb.ratios[gear]);
    } else if (gear > 0 && speedSm * gb.ratios[gear] < gb.down){
      gear--; target = Math.max(gb.idle, speedSm * gb.ratios[gear]);
    }
    shiftCut = Math.max(0, shiftCut - dt);
    rpm += (target - rpm) * Math.min(1, dt * (shiftCut > 0 ? 14 : gb.rate));
    rpm = Math.min(rpm, P.gauge.max);
  }
  const n = Math.min(1, speedSm / 150);
  const rate = n > spool ? (P.spoolUp || 1) : (P.spoolDown || 1.5);
  spool += (n - spool) * Math.min(1, dt * rate);
}

/* ================= GPS ================= */
let mode = 'demo', watchId = null, lastFix = null;
const statusEl = document.getElementById('status');
function setStatus(msg, err, ok){ statusEl.textContent = msg || ''; statusEl.classList.toggle('err', !!err); statusEl.classList.toggle('ok', !!ok); }
function haversine(a, b){
  const R2 = 6371000, toR = Math.PI / 180;
  const dLat = (b.latitude - a.latitude) * toR, dLon = (b.longitude - a.longitude) * toR;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.latitude*toR) * Math.cos(b.latitude*toR) * Math.sin(dLon/2)**2;
  return 2 * R2 * Math.asin(Math.sqrt(s));
}
function startGPS(){
  if (!('geolocation' in navigator)){ setStatus('GPS ikke tilgængelig i denne browser', true); return; }
  if (!window.isSecureContext){ setStatus('GPS kræver HTTPS — brug demo, eller læg filen på et website', true); return; }
  setStatus('Venter på GPS…');
  watchId = navigator.geolocation.watchPosition(p => {
    const c = p.coords;
    if (c.speed != null && !isNaN(c.speed)) speedTarget = Math.max(0, c.speed * 3.6);
    else if (lastFix && (p.timestamp - lastFix.t) > 300 && (p.timestamp - lastFix.t) < 6000){
      const d = haversine(lastFix.c, c);
      speedTarget = Math.min(250, d / ((p.timestamp - lastFix.t) / 1000) * 3.6);
    }
    lastFix = {c: {latitude: c.latitude, longitude: c.longitude}, t: p.timestamp};
    setStatus(`GPS aktiv · ±${Math.round(c.accuracy)} m`, false, true);
  }, e => { setStatus(e.code === 1 ? 'GPS afvist — tillad placering i browseren' : 'Ingen GPS-signal', true); },
  {enableHighAccuracy: true, maximumAge: 500, timeout: 12000});
}
function stopGPS(){ if (watchId != null){ navigator.geolocation.clearWatch(watchId); watchId = null; } lastFix = null; }

/* ================= WAKE LOCK ================= */
let wakeLock = null;
async function grabWakeLock(){ try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible'){ if (running) grabWakeLock(); if (ctx && ctx.state !== 'running') ctx.resume(); }
});

/* ================= MOTORSTYRING ================= */
function startEngine(){
  const P = PRESETS[presetKey];
  engine = P.sample ? buildSampleEngine(runGain, P.sample, P) : P.build(runGain);
  runGain.gain.cancelScheduledValues(ctx.currentTime);
  runGain.gain.setTargetAtTime(1, ctx.currentTime, 0.1);
  if (P.gears && speedSm < 5){ startup = {ph: 'flare', t: 0}; rpm = P.gears.idle * 0.7; }
}
function finishStopEngine(){
  if (!ctx || !engine) return;
  runGain.gain.cancelScheduledValues(ctx.currentTime);
  runGain.gain.setTargetAtTime(0, ctx.currentTime, 0.09);
  const old = engine; engine = null;
  setTimeout(() => old.teardown(), 500);
}
function swapPreset(key){
  presetKey = key; const P = PRESETS[key];
  gear = 0; rpm = P.gears ? P.gears.idle : 0; shiftCut = 0; startup = null; shutdown = null;
  gaugeWrap.classList.add('swap');
  setTimeout(() => { applyTheme(key); gaugeWrap.classList.remove('swap'); }, 160);
  refreshStartBtn();
  if (running){
    // skift lyd — hvis ny profil er sample og ikke afkodet endnu, håndteres i klik; her er den allerede afkodet ved START
    finishStopEngine();
    if (!P.sample || SAMPLE_CACHE[P.sample]) startEngine();
    else { ensureSamples(P.sample).then(() => { if (running) startEngine(); }); }
  }
}

/* ================= FLØJTE (damp) ================= */
let whistle = null;
function whistleOn(){
  if (!running || presetKey !== 'damp' || whistle || !ctx) return;
  const g = mkGain(0); g.connect(runGain); const stops = [];
  for (const f of [622, 784, 988]){
    const o = mkOsc('sine', f); const v = mkOsc('sine', 5.2); const vg = mkGain(5);
    v.connect(vg); vg.connect(o.frequency); const og = mkGain(0.3); o.connect(og); og.connect(g); stops.push(o, v);
  }
  const ns = noiseSource(); stops.push(ns);
  const bf = mkFilter('bandpass', 900, 1); const bg = mkGain(0.06);
  ns.connect(bf); bf.connect(bg); bg.connect(g);
  g.gain.setTargetAtTime(0.35, ctx.currentTime, 0.05); whistle = {g, stops};
}
function whistleOff(){
  if (!whistle) return; const w = whistle; whistle = null;
  w.g.gain.setTargetAtTime(0, ctx.currentTime, 0.15);
  setTimeout(() => w.stops.forEach(x => { try { x.stop(); } catch(e){} }), 600);
}
const wb = document.getElementById('whistleBtn');
wb.addEventListener('pointerdown', whistleOn); wb.addEventListener('pointerup', whistleOff);
wb.addEventListener('pointerleave', whistleOff); wb.addEventListener('pointercancel', whistleOff);

/* ================= STJERNEHIMMEL (warp) ================= */
const starCanvas = document.getElementById('stars'); const sctx = starCanvas.getContext('2d');
const stars = [];
for (let i = 0; i < 130; i++) stars.push({x: Math.random() - .5, y: Math.random() - .5, z: Math.random()});
function sizeStars(){ starCanvas.width = innerWidth; starCanvas.height = innerHeight; }
addEventListener('resize', sizeStars); sizeStars();
function drawStars(dt){
  const w = starCanvas.width, h = starCanvas.height; sctx.clearRect(0, 0, w, h);
  sctx.fillStyle = '#CBB8FF'; sctx.strokeStyle = '#8F6BFF';
  for (const s of stars){
    s.z -= dt * (0.04 + spool * 0.55);
    if (s.z <= 0.02){ s.z = 1; s.x = Math.random() - .5; s.y = Math.random() - .5; }
    const sx = w/2 + s.x / s.z * w * .5, sy = h/2 + s.y / s.z * h * .5;
    if (sx < 0 || sx > w || sy < 0 || sy > h) continue;
    const sz = (1 - s.z) * 2.2; sctx.globalAlpha = (1 - s.z) * .9;
    if (spool > 0.15){
      const len = spool * 14 * (1 - s.z); const dx = sx - w/2, dy = sy - h/2, m = Math.hypot(dx, dy) || 1;
      sctx.lineWidth = sz; sctx.beginPath(); sctx.moveTo(sx, sy); sctx.lineTo(sx - dx/m*len, sy - dy/m*len); sctx.stroke();
    } else { sctx.beginPath(); sctx.arc(sx, sy, sz, 0, 7); sctx.fill(); }
  }
  sctx.globalAlpha = 1;
}

/* ================= UI ================= */
const speedEl = document.getElementById('speed');
const subEl = document.getElementById('subread');
const startBtn = document.getElementById('startBtn');
const demoSlider = document.getElementById('demoSpeed');
const abBadge = document.getElementById('abBadge');

function refreshStartBtn(){
  const ice = PRESETS[presetKey].kind === 'engine';
  startBtn.classList.toggle('busy', busy);
  startBtn.textContent = busy ? 'INDLÆSER…' : (running ? (ice ? 'SLUK MOTOR' : 'STOP') : (ice ? 'START MOTOR' : 'START'));
  startBtn.classList.toggle('running', running);
}
document.getElementById('chips').addEventListener('click', e => {
  const b = e.target.closest('.chip'); if (!b) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === b));
  swapPreset(b.dataset.p);
});
document.getElementById('modeToggle').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  document.querySelectorAll('#modeToggle button').forEach(c => c.classList.toggle('active', c === b));
  mode = b.dataset.m; document.body.classList.toggle('demo', mode === 'demo'); stopGPS();
  if (mode === 'gps'){ if (running) startGPS(); speedTarget = 0; } else { setStatus(''); speedTarget = +demoSlider.value; }
});
demoSlider.addEventListener('input', () => { if (mode === 'demo') speedTarget = +demoSlider.value; });
document.getElementById('vol').addEventListener('input', e => { if (userGain) userGain.gain.setTargetAtTime(e.target.value / 100, ctx.currentTime, 0.05); });

startBtn.addEventListener('click', async () => {
  if (busy) return;
  if (!running){
    busy = true; refreshStartBtn();
    try {
      baseCtx();
      if (ctx.state !== 'running') await ctx.resume();
      const P = PRESETS[presetKey];
      if (P.sample) await ensureSamples(P.sample);
    } catch(err){ busy = false; setStatus('Lyd kunne ikke startes i denne browser', true); refreshStartBtn(); return; }
    busy = false; running = true; shutdown = null;
    startEngine(); grabWakeLock(); if (mode === 'gps') startGPS();
  } else {
    running = false; stopGPS(); whistleOff();
    if (wakeLock){ wakeLock.release(); wakeLock = null; }
    if (startup) startup = null;
    if (engine && PRESETS[presetKey].kind === 'engine') shutdown = {t: 0, from: Math.max(rpm, 500)};
    else finishStopEngine();
  }
  refreshStartBtn();
});

/* ================= HOVEDLOOP ================= */
let lastT = performance.now(); let needleN = 0, needleVel = 0;
function loop(now){
  const dt = Math.min(0.05, (now - lastT) / 1000) || 0.016; lastT = now;
  stepSim(dt);
  const P = PRESETS[presetKey];
  const thrEff = shiftCut > 0 ? throttle * 0.15 : throttle;

  let val = 0, sub = '';
  if (P.kind === 'engine'){
    val = Math.min(rpm, P.gauge.max);
    const gearTxt = speedSm < 1 ? 'N' : (gear + 1);
    sub = `GEAR <b>${gearTxt}</b> · ${running ? Math.round(val) : 0} O/MIN`;
    if (startup && startup.ph === 'flare' && rpm < P.gears.idle) sub = 'STARTER <b>…</b>';
  } else if (P.kind === 'jet'){
    const pct = Math.round(25 + spool * 85); val = pct;
    const ab = engine && engine.getAB ? engine.getAB() : 0;
    sub = `N1 <b>${running ? pct : 0}%</b>${ab > 0.5 ? ' · <b>AFTERBURNER</b>' : ''}`;
    abBadge.classList.toggle('on', ab > 0.5);
  } else if (P.kind === 'damp'){
    const bar = 0.8 + spool * 8.6; val = bar; sub = `KEDELTRYK <b>${running ? bar.toFixed(1) : '0.0'}</b> BAR`;
  } else { const wf = spool * 10; val = wf; sub = `WARP <b>${running ? wf.toFixed(1) : '0.0'}</b>`; }

  if (shutdown){
    if (engine){
      shutdown.t += dt; const k = Math.max(0, 1 - shutdown.t / 0.6);
      engine.update({rpm: 60 + shutdown.from * k * k, thr: 0.05, spool, dt, shifted: false, speed: 0});
      if (engine.setMaster) engine.setMaster(k, 0.1);
      if (shutdown.t > 0.65){ finishStopEngine(); shutdown = null; }
    } else shutdown = null;
  } else if (engine && running){
    engine.update({rpm, thr: thrEff, spool, dt, shifted: justShifted, speed: speedSm});
  }
  if (justShifted){ subEl.classList.remove('bump'); void subEl.offsetWidth; subEl.classList.add('bump'); if (navigator.vibrate) navigator.vibrate(18); }
  justShifted = false;

  const nTarget = running ? Math.min(1, Math.max(0, val / G.max)) : 0;
  needleVel += ((nTarget - needleN) * 130 - needleVel * 11) * dt; needleN += needleVel * dt;
  drawTachN(needleN);
  const over = running && P.kind === 'engine' && val >= P.gauge.red;
  speedEl.classList.toggle('over', over); needle.setAttribute('stroke', over ? TH.red : TH.needle);
  speedEl.textContent = Math.round(speedSm); subEl.innerHTML = sub;
  if (presetKey === 'warp') drawStars(dt);
  requestAnimationFrame(loop);
}
applyTheme('v8'); refreshStartBtn(); requestAnimationFrame(loop);
</script>
</body>
</html>
