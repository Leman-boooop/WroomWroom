<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>EV·LYD — motorlyd til din elbil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Audiowide&family=Barlow+Condensed:wght@500;600&family=Chakra+Petch:wght@500;600;700&family=Jost:wght@500;600&family=Orbitron:wght@600;700&family=Oswald:wght@500;600&family=Playfair+Display:wght@600;700&family=Saira+Stencil+One&family=Titillium+Web:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0D0C0A; --panel:#17150F; --line:#2A251C;
    --accent:#D8D3C8; --accent-contrast:#141210; --needle:#E03A2F; --red:#E03A2F;
    --dim:#7E7A6F; --fg:#F2EFE7;
    --gauge-fg:var(--fg); --gauge-dim:var(--dim);
    --font:'Oswald';
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--fg);
    font-family:var(--font),'Chakra Petch',system-ui,sans-serif;
    display:flex;flex-direction:column;height:100dvh;
    padding:max(10px,env(safe-area-inset-top)) 14px max(14px,env(safe-area-inset-bottom));
    overflow:hidden;user-select:none;-webkit-user-select:none;
    transition:background .25s,color .25s;
  }
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;display:none}
  body[data-p="warp"] #stars{display:block}
  header,main,.controls{position:relative;z-index:1}

  header{display:flex;flex-direction:column;gap:8px;padding:2px 0 8px}
  .topline{display:flex;align-items:center;justify-content:space-between}
  .wordmark{font-weight:700;letter-spacing:.18em;font-size:15px}
  .wordmark span{color:var(--accent)}
  .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;font-family:inherit;font-weight:600;font-size:12px;letter-spacing:.07em;
    color:var(--dim);background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:8px 13px;cursor:pointer;transition:color .15s,border-color .15s;
  }
  .chip.active{color:var(--accent);border-color:var(--accent)}

  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0}
  .gauge-wrap{position:relative;width:min(92vw,44dvh,420px)}
  svg{display:block;width:100%;height:auto}
  .tick-label{font-family:var(--font),sans-serif;font-size:11px;font-weight:600}

  #shiftLights{display:none;position:absolute;top:-2px;left:0;right:0;justify-content:center;gap:7px}
  body[data-p="f1"] #shiftLights{display:flex}
  #shiftLights i{width:11px;height:11px;border-radius:50%;background:var(--line);transition:background .05s,box-shadow .05s}
  #shiftLights i.on:nth-child(-n+3){background:#2ECC40;box-shadow:0 0 8px #2ECC40}
  #shiftLights i.on:nth-child(n+4):nth-child(-n+6){background:#FF4136;box-shadow:0 0 8px #FF4136}
  #shiftLights i.on:nth-child(n+7){background:#3D9BFF;box-shadow:0 0 8px #3D9BFF}

  #abBadge{
    display:none;position:absolute;top:14%;right:6%;
    font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--red);
    border:1.5px solid var(--red);border-radius:6px;padding:3px 7px;opacity:.15;transition:opacity .2s;
  }
  body[data-p="jet"] #abBadge{display:block}
  #abBadge.on{opacity:1;text-shadow:0 0 10px var(--red)}

  .center-read{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;pointer-events:none;padding-top:8%;
  }
  #speed{font-size:clamp(50px,16vw,82px);font-weight:700;line-height:1;font-variant-numeric:tabular-nums;color:var(--gauge-fg)}
  .unit{color:var(--gauge-dim);font-size:13px;letter-spacing:.22em;margin-top:2px}
  #subread{color:var(--gauge-dim);font-size:13px;letter-spacing:.06em;margin-top:9px;font-variant-numeric:tabular-nums}
  #subread b{color:var(--gauge-fg);font-weight:600}

  #status{color:var(--dim);font-size:12px;text-align:center;min-height:16px;margin-top:2px}
  #status.err{color:var(--red)}

  .controls{display:flex;flex-direction:column;gap:11px;padding-top:8px}
  .row{display:flex;align-items:center;gap:12px}

  #boostRow{display:none}
  body[data-p="rally"] #boostRow{display:flex}
  #boostRow label{font-size:11px;letter-spacing:.12em;color:var(--dim)}
  .bar{flex:1;height:8px;border-radius:4px;background:var(--line);overflow:hidden}
  #boostFill{height:100%;width:0%;background:var(--accent);border-radius:4px}

  #whistleBtn{
    display:none;font-family:inherit;font-weight:600;font-size:13px;letter-spacing:.16em;
    padding:12px;border-radius:12px;cursor:pointer;
    background:var(--panel);color:var(--accent);border:1px solid var(--accent);
  }
  body[data-p="damp"] #whistleBtn{display:block}
  #whistleBtn:active{background:var(--accent);color:var(--accent-contrast)}

  .toggle{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .toggle button{
    font-family:inherit;font-weight:600;font-size:12px;letter-spacing:.1em;
    background:none;border:0;color:var(--dim);padding:10px 15px;cursor:pointer;
  }
  .toggle button.active{background:var(--line);color:var(--fg)}

  .slider-row{flex:1;display:flex;align-items:center;gap:10px}
  .slider-row label{font-size:11px;letter-spacing:.1em;color:var(--dim);white-space:nowrap}
  input[type=range]{flex:1;appearance:none;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--line);outline:none}
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:24px;height:24px;border-radius:50%;
    background:var(--fg);border:none;cursor:pointer;
  }
  #demoRow{display:none}
  body.demo #demoRow{display:flex}

  #startBtn{
    font-family:inherit;font-weight:700;font-size:17px;letter-spacing:.24em;
    padding:16px;border-radius:14px;border:0;cursor:pointer;
    background:var(--accent);color:var(--accent-contrast);transition:background .15s;
  }
  #startBtn.running{background:var(--panel);color:var(--red);border:1px solid var(--red)}
  .hint{color:var(--dim);font-size:11px;text-align:center;letter-spacing:.02em}
</style>
</head>
<body class="demo" data-p="mustang">

<canvas id="stars"></canvas>

<header>
  <div class="topline"><div class="wordmark">EV<span>·</span>LYD</div></div>
  <div class="chips" id="chips">
    <button class="chip active" data-p="mustang">MUSTANG</button>
    <button class="chip" data-p="v12">V12</button>
    <button class="chip" data-p="boxer">BOXER</button>
    <button class="chip" data-p="rally">RALLY</button>
    <button class="chip" data-p="f1">F1</button>
    <button class="chip" data-p="diesel">DIESEL</button>
    <button class="chip" data-p="totakt">2-TAKT</button>
    <button class="chip" data-p="damp">DAMP</button>
    <button class="chip" data-p="jet">JET</button>
    <button class="chip" data-p="warp">WARP</button>
  </div>
</header>

<main>
  <div class="gauge-wrap">
    <div id="shiftLights"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <svg viewBox="0 0 240 222" id="tach" aria-hidden="true"></svg>
    <div id="abBadge">AB</div>
    <div class="center-read">
      <div id="speed">0</div>
      <div class="unit">KM/T</div>
      <div id="subread"></div>
    </div>
  </div>
  <div id="status"></div>
</main>

<section class="controls">
  <div class="row" id="boostRow">
    <label>BOOST</label>
    <div class="bar"><div id="boostFill"></div></div>
  </div>
  <button id="whistleBtn">HOLD FOR FLØJTE</button>
  <div class="row" id="demoRow">
    <div class="slider-row">
      <label>DEMO-FART</label>
      <input type="range" id="demoSpeed" min="0" max="160" value="0" step="1">
    </div>
  </div>
  <div class="row">
    <div class="toggle" id="modeToggle">
      <button data-m="demo" class="active">DEMO</button>
      <button data-m="gps">GPS</button>
    </div>
    <div class="slider-row">
      <label>LYD</label>
      <input type="range" id="vol" min="0" max="100" value="70">
    </div>
  </div>
  <button id="startBtn">START</button>
  <div class="hint">Hold skærmen tændt under kørsel — browseren pauser lyd og GPS i baggrunden.</div>
</section>

<script>
"use strict";

/* ================= AUDIO-KERNE ================= */
let ctx = null, comp = null, userGain = null, runGain = null;
let engine = null, running = false, presetKey = 'mustang';

function ensureCtx(){
  if (ctx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  ctx = new AC();
  comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -14; comp.ratio.value = 5; comp.knee.value = 10;
  userGain = ctx.createGain();
  userGain.gain.value = document.getElementById('vol').value / 100;
  runGain = ctx.createGain(); runGain.gain.value = 0;
  runGain.connect(userGain); userGain.connect(comp); comp.connect(ctx.destination);
}

let noiseBuf = null;
function noiseSource(){
  if (!noiseBuf){
    noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  }
  const s = ctx.createBufferSource();
  s.buffer = noiseBuf; s.loop = true; s.start();
  return s;
}
function tanhCurve(k){
  const c = new Float32Array(1024);
  for (let i = 0; i < 1024; i++){ const x = i / 511.5 - 1; c[i] = Math.tanh(k * x); }
  return c;
}
function mkGain(v){ const g = ctx.createGain(); g.gain.value = v; return g; }
function mkOsc(type, f){ const o = ctx.createOscillator(); o.type = type; o.frequency.value = f; o.start(); return o; }
function mkFilter(type, f, q){ const b = ctx.createBiquadFilter(); b.type = type; b.frequency.value = f; if (q) b.Q.value = q; return b; }

function oscStack(defs, dest, stops){
  const list = [];
  for (const [mult, type, vol] of defs){
    const o = mkOsc(type, 55 * mult);
    const g = mkGain(vol);
    o.connect(g); g.connect(dest);
    list.push({o, mult}); stops.push(o);
  }
  return { setF(f, t, tc){ for (const {o, mult} of list) o.frequency.setTargetAtTime(f * mult, t, tc); } };
}

// kort lyd-burst (backfire, blowoff, chuff ...)
function pop(out, o){
  const src = noiseSource();
  const f = mkFilter(o.type || 'bandpass', o.fc, o.q || 1);
  const g = ctx.createGain();
  const t = ctx.currentTime;
  g.gain.setValueAtTime(o.g, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + o.dur);
  src.connect(f); f.connect(g); g.connect(out);
  src.stop(t + o.dur + 0.05);
}

/* ---------- lyd-buildere (returnerer {update(s), teardown}) ---------- */

function buildMustang(out){
  const stops = [];
  const g = mkGain(0.22); g.connect(out);
  const lp = mkFilter('lowpass', 450, 0.9); lp.connect(g);
  const shaper = ctx.createWaveShaper(); shaper.curve = tanhCurve(3); shaper.oversample = '2x'; shaper.connect(lp);
  const pre = mkGain(0.95); pre.connect(shaper);
  const stack = oscStack([[1,'sawtooth',.5],[0.5,'sawtooth',.5],[1.017,'sawtooth',.2],[2,'square',.07]], pre, stops);
  const ns = noiseSource(); stops.push(ns);
  const bp = mkFilter('bandpass', 110, 0.6); const ng = mkGain(0.14);
  ns.connect(bp); bp.connect(ng); ng.connect(pre);
  // idle-lope (kamaksel-hop)
  const lfo = mkOsc('sine', 4); stops.push(lfo);
  const lg = mkGain(0); lfo.connect(lg); lg.connect(g.gain);
  return {
    update(s){
      const t = ctx.currentTime, f = s.rpm / 60 * 4;
      stack.setF(f, t, .04);
      lfo.frequency.setTargetAtTime(Math.max(3, s.rpm / 120), t, .1);
      const lope = Math.max(0, 1 - (s.rpm - 700) / 900) * Math.max(0, 0.5 - s.thr * 0.4);
      lg.gain.setTargetAtTime(lope * 0.13, t, .1);
      lp.frequency.setTargetAtTime(360 + s.thr * 2600 + s.rpm * 0.22, t, .06);
      g.gain.setTargetAtTime(0.15 + s.thr * 0.5, t, .09);
      bp.frequency.setTargetAtTime(85 + s.rpm * 0.05, t, .1);
      ng.gain.setTargetAtTime(0.08 + s.thr * 0.22, t, .1);
      if (s.thr < 0.17 && s.rpm > 2200 && Math.random() < s.dt * 6)
        pop(out, {fc: 110 + Math.random() * 120, q: .8, g: .5, dur: .09});
    },
    teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

function buildV12(out){
  const stops = [];
  const g = mkGain(0.2); g.connect(out);
  const lp = mkFilter('lowpass', 900, 0.8); lp.connect(g);
  const shaper = ctx.createWaveShaper(); shaper.curve = tanhCurve(1.8); shaper.oversample = '2x'; shaper.connect(lp);
  const pre = mkGain(0.85); pre.connect(shaper);
  const stack = oscStack([[1,'sawtooth',.42],[2,'sawtooth',.3],[1.008,'sawtooth',.24],[3,'sawtooth',.12],[0.5,'sawtooth',.2]], pre, stops);
  // indsugnings-skrig
  const sf = mkFilter('bandpass', 2000, 3); const sg = mkGain(0);
  pre.connect(sf); sf.connect(sg); sg.connect(g);
  return {
    update(s){
      const t = ctx.currentTime, f = s.rpm / 60 * 6;
      stack.setF(f, t, .035);
      lp.frequency.setTargetAtTime(650 + s.thr * 5200 + s.rpm * 0.32, t, .05);
      g.gain.setTargetAtTime(0.13 + s.thr * 0.45, t, .08);
      sf.frequency.setTargetAtTime(f * 3, t, .05);
      sg.gain.setTargetAtTime(s.thr * 0.22 * Math.min(1, s.rpm / 5000), t, .1);
    },
    teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

function buildBoxer(out){
  const stops = [];
  const g = mkGain(0.22); g.connect(out);
  const lp = mkFilter('lowpass', 600, 0.9); lp.connect(g);
  const shaper = ctx.createWaveShaper(); shaper.curve = tanhCurve(3.2); shaper.oversample = '2x'; shaper.connect(lp);
  const pre = mkGain(0.9); pre.connect(shaper);
  const stack = oscStack([[1,'sawtooth',.45],[1.02,'square',.22],[0.5,'sawtooth',.35],[2,'sawtooth',.15]], pre, stops);
  // luftkølet rasp
  const ns = noiseSource(); stops.push(ns);
  const rf = mkFilter('bandpass', 1800, 1.4); const rg = mkGain(0.04);
  ns.connect(rf); rf.connect(rg); rg.connect(g);
  return {
    update(s){
      const t = ctx.currentTime, f = s.rpm / 60 * 3;
      stack.setF(f, t, .04);
      lp.frequency.setTargetAtTime(420 + s.thr * 3600 + s.rpm * 0.3, t, .06);
      g.gain.setTargetAtTime(0.14 + s.thr * 0.5, t, .09);
      rf.frequency.setTargetAtTime(1500 + s.rpm * 0.35, t, .1);
      rg.gain.setTargetAtTime(0.03 + s.thr * 0.08 + (s.rpm / 7500) * 0.07, t, .1);
      if (s.thr < 0.17 && s.rpm > 2600 && Math.random() < s.dt * 9)
        pop(out, {fc: 450 + Math.random() * 500, q: 1.2, g: .3, dur: .05});
    },
    teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

function buildRally(out){
  const stops = []; let boost = 0;
  const g = mkGain(0.22); g.connect(out);
  const lp = mkFilter('lowpass', 500, 1); lp.connect(g);
  const shaper = ctx.createWaveShaper(); shaper.curve = tanhCurve(3.5); shaper.oversample = '2x'; shaper.connect(lp);
  const pre = mkGain(0.95); pre.connect(shaper);
  const stack = oscStack([[1,'sawtooth',.5],[0.5,'square',.4],[1.01,'sawtooth',.24],[1.5,'sawtooth',.16]], pre, stops);
  // turbofløjt
  const w = mkOsc('sawtooth', 1500); stops.push(w);
  const wf = mkFilter('bandpass', 1500, 6); const wg = mkGain(0);
  w.connect(wf); wf.connect(wg); wg.connect(g);
  return {
    getBoost(){ return boost; },
    update(s){
      const t = ctx.currentTime, f = s.rpm / 60 * 2;
      const target = s.thr * Math.min(1, s.rpm / 3200);
      boost += (target - boost) * Math.min(1, s.dt * (target > boost ? 1.8 : 4));
      stack.setF(f, t, .04);
      lp.frequency.setTargetAtTime(380 + s.thr * 3000 + s.rpm * 0.28, t, .06);
      g.gain.setTargetAtTime(0.15 + s.thr * 0.48, t, .09);
      const whz = 1400 + boost * 5200;
      w.frequency.setTargetAtTime(whz, t, .08);
      wf.frequency.setTargetAtTime(whz, t, .08);
      wg.gain.setTargetAtTime(boost * 0.06, t, .1);
      if (s.shifted && boost > 0.3){
        pop(out, {fc: 3200, q: .7, g: .45, dur: .22, type: 'highpass'});   // blow-off psshh
        boost *= 0.25;
      }
    },
    teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

function buildF1(out){
  const stops = [];
  const g = mkGain(0.17); g.connect(out);
  const lp = mkFilter('lowpass', 1500, 0.7); lp.connect(g);
  const shaper = ctx.createWaveShaper(); shaper.curve = tanhCurve(1.5); shaper.oversample = '2x'; shaper.connect(lp);
  const pre = mkGain(0.8); pre.connect(shaper);
  const stack = oscStack([[1,'sawtooth',.42],[2,'sawtooth',.3],[0.5,'sawtooth',.18],[3.01,'sawtooth',.12]], pre, stops);
  return {
    update(s){
      const t = ctx.currentTime, f = s.rpm / 60 * 5;
      stack.setF(f, t, .025);
      lp.frequency.setTargetAtTime(1100 + s.thr * 7000 + s.rpm * 0.14, t, .04);
      g.gain.setTargetAtTime(0.11 + s.thr * 0.4, t, .07);
    },
    teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

function buildDiesel(out){
  const stops = []; let boost = 0;
  const g = mkGain(0.26); g.connect(out);
  const lp = mkFilter('lowpass', 350, 0.9); lp.connect(g);
  const shaper = ctx.createWaveShaper(); shaper.curve = tanhCurve(3.5); shaper.oversample = '2x'; shaper.connect(lp);
  const pre = mkGain(1); pre.connect(shaper);
  const stack = oscStack([[1,'sawtooth',.4],[0.5,'square',.5],[1.5,'sawtooth',.12]], pre, stops);
  // klapren: noise moduleret i tændingstakt
  const ns = noiseSource(); stops.push(ns);
  const cf = mkFilter('bandpass', 1100, 1); const cg = mkGain(0.09);
  ns.connect(cf); cf.connect(cg); cg.connect(g);
  const am = mkOsc('square', 35); stops.push(am);
  const ag = mkGain(0.06); am.connect(ag); ag.connect(cg.gain);
  // turbo-whine
  const w = mkOsc('sawtooth', 900); stops.push(w);
  const wfl = mkFilter('bandpass', 900, 7); const wg = mkGain(0);
  w.connect(wfl); wfl.connect(wg); wg.connect(g);
  return {
    update(s){
      const t = ctx.currentTime, f = s.rpm / 60 * 3;
      const target = s.thr * Math.min(1, s.rpm / 2200);
      boost += (target - boost) * Math.min(1, s.dt * (target > boost ? 0.9 : 2.5));
      stack.setF(f, t, .05);
      am.frequency.setTargetAtTime(Math.max(20, f), t, .06);
      lp.frequency.setTargetAtTime(260 + s.thr * 1100 + s.rpm * 0.15, t, .08);
      g.gain.setTargetAtTime(0.18 + s.thr * 0.42, t, .1);
      const whz = 800 + boost * 2600;
      w.frequency.setTargetAtTime(whz, t, .1);
      wfl.frequency.setTargetAtTime(whz, t, .1);
      wg.gain.setTargetAtTime(0.015 + boost * 0.04, t, .12);
    },
    teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

function buildTotakt(out){
  const stops = [];
  const g = mkGain(0.18); g.connect(out);
  const lp = mkFilter('lowpass', 900, 1.2); lp.connect(g);
  const shaper = ctx.createWaveShaper(); shaper.curve = tanhCurve(4); shaper.oversample = '2x'; shaper.connect(lp);
  const pre = mkGain(0.9); pre.connect(shaper);
  const stack = oscStack([[1,'square',.4],[1,'sawtooth',.3],[1.03,'sawtooth',.2],[2,'square',.2],[3,'sawtooth',.1]], pre, stops);
  // "ring"-resonans
  const rf = mkFilter('bandpass', 1200, 4); const rg = mkGain(0.12);
  pre.connect(rf); rf.connect(rg); rg.connect(g);
  return {
    update(s){
      const t = ctx.currentTime, f = s.rpm / 60 * 2;
      stack.setF(f, t, .03);
      lp.frequency.setTargetAtTime(700 + s.thr * 4200 + s.rpm * 0.28, t, .05);
      g.gain.setTargetAtTime(0.11 + s.thr * 0.42, t, .08);
      rf.frequency.setTargetAtTime(Math.min(4500, f * 4), t, .06);
    },
    teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

function buildDamp(out){
  const stops = []; let phase = 0;
  const g = mkGain(0.7); g.connect(out);
  // konstant damp-hvislen
  const ns1 = noiseSource(); stops.push(ns1);
  const hf = mkFilter('lowpass', 5500); const hg = mkGain(0.018);
  ns1.connect(hf); hf.connect(hg); hg.connect(g);
  // dyb rullen (skinner/kedel)
  const ns2 = noiseSource(); stops.push(ns2);
  const rf = mkFilter('lowpass', 140); const rg = mkGain(0);
  ns2.connect(rf); rf.connect(rg); rg.connect(g);
  return {
    update(s){
      const t = ctx.currentTime;
      const n = Math.min(1, s.speed / 150);
      const rate = Math.min(10, 0.7 + s.speed * 0.11);
      phase += rate * s.dt;
      if (phase >= 1){
        phase %= 1;
        pop(g, {fc: 280 + Math.random() * 180, q: 1.1, g: .5, dur: Math.min(.5, .7 / rate)});  // chuff
      }
      hg.gain.setTargetAtTime(0.014 + n * 0.04, t, .2);
      rg.gain.setTargetAtTime(n * 0.24, t, .2);
    },
    teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

function buildJet(out){
  const stops = []; let ab = 0;
  const g = mkGain(0.6); g.connect(out);
  const ns1 = noiseSource(); stops.push(ns1);
  const bp = mkFilter('bandpass', 220, 0.9); const g1 = mkGain(0.4);
  ns1.connect(bp); bp.connect(g1); g1.connect(g);
  const ns2 = noiseSource(); stops.push(ns2);
  const hp = mkFilter('highpass', 3200); const g2 = mkGain(0);
  ns2.connect(hp); hp.connect(g2); g2.connect(g);
  const whine = mkOsc('sawtooth', 700); stops.push(whine);
  const wf = mkFilter('bandpass', 700, 9); const g3 = mkGain(0.03);
  whine.connect(wf); wf.connect(g3); g3.connect(g);
  // afterburner: dybt brøl
  const ns3 = noiseSource(); stops.push(ns3);
  const af = mkFilter('lowpass', 170); const agn = mkGain(0);
  ns3.connect(af); af.connect(agn); agn.connect(g);
  return {
    getAB(){ return ab; },
    update(s){
      const t = ctx.currentTime;
      const abT = s.thr > 0.72 && s.spool > 0.25 ? 1 : 0;
      ab += (abT - ab) * Math.min(1, s.dt * 1.4);
      bp.frequency.setTargetAtTime(200 + s.spool * 2100, t, .12);
      g1.gain.setTargetAtTime(0.3 + s.spool * 0.38 + s.thr * 0.1, t, .15);
      g2.gain.setTargetAtTime(s.spool * 0.2, t, .15);
      const whz = 650 + s.spool * 4300;
      whine.frequency.setTargetAtTime(whz, t, .15);
      wf.frequency.setTargetAtTime(whz, t, .15);
      g3.gain.setTargetAtTime(0.02 + s.spool * 0.07, t, .15);
      agn.gain.setTargetAtTime(ab * 0.5, t, .15);
      if (ab > 0.4 && Math.random() < s.dt * 12)
        pop(g, {fc: 90 + Math.random() * 90, q: .8, g: .25, dur: .06});
    },
    teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

function buildWarp(out){
  const stops = [];
  const g = mkGain(0.45); g.connect(out);
  const lp = mkFilter('lowpass', 500, 2.5); lp.connect(g);
  const oscs = [];
  for (const [mult, type, vol] of [[1,'triangle',.45],[1.006,'triangle',.4],[0.5,'sine',.5]]){
    const o = mkOsc(type, 60 * mult);
    const og = mkGain(vol); o.connect(og); og.connect(lp);
    oscs.push({o, mult}); stops.push(o);
  }
  const lfo = mkOsc('sine', 0.13); stops.push(lfo);
  const lfoG = mkGain(220); lfo.connect(lfoG); lfoG.connect(lp.frequency);
  const ns = noiseSource(); stops.push(ns);
  const hp = mkFilter('highpass', 5600); const sg = mkGain(0.012);
  ns.connect(hp); hp.connect(sg); sg.connect(g);
  return {
    update(s){
      const t = ctx.currentTime;
      const f = 52 + s.spool * 330;
      for (const {o, mult} of oscs) o.frequency.setTargetAtTime(f * mult, t, .12);
      lp.frequency.setTargetAtTime(320 + s.spool * 2600 + s.thr * 500, t, .12);
      sg.gain.setTargetAtTime(0.01 + s.spool * 0.05, t, .2);
      g.gain.setTargetAtTime(0.32 + s.spool * 0.28, t, .15);
    },
    teardown(){ stops.forEach(x => { try { x.stop(ctx.currentTime + .4); } catch(e){} }); }
  };
}

/* ================= GAUGE (SVG) ================= */
const SVGNS = "http://www.w3.org/2000/svg";
const tach = document.getElementById('tach');
const CX = 120, CY = 118, R = 100, A0 = 150, SWEEP = 240;
let G = null, activeArc = null, needle = null, ARCLEN = 0;

function polar(deg, r){ const a = deg * Math.PI / 180; return [CX + r * Math.cos(a), CY + r * Math.sin(a)]; }
function arcPath(d0, d1, r){
  const [x0, y0] = polar(d0, r), [x1, y1] = polar(d1, r);
  return `M ${x0} ${y0} A ${r} ${r} 0 ${(d1 - d0) > 180 ? 1 : 0} 1 ${x1} ${y1}`;
}
function el(name, attrs){
  const e = document.createElementNS(SVGNS, name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}
function buildGauge(p){
  const gg = p.gauge, th = p.theme;
  G = gg;
  tach.innerHTML = '';
  if (th.face) tach.appendChild(el('circle', {cx: CX, cy: CY, r: 104, fill: th.face}));
  tach.appendChild(el('path', {d: arcPath(A0, A0 + SWEEP, R), stroke: th.arc || th.line, 'stroke-width': 6, fill: 'none', 'stroke-linecap': 'round'}));
  const redDeg = A0 + SWEEP * (gg.red / gg.max);
  tach.appendChild(el('path', {d: arcPath(redDeg, A0 + SWEEP, R), stroke: th.red, 'stroke-width': 6, fill: 'none', 'stroke-linecap': 'round', opacity: .9}));
  activeArc = el('path', {d: arcPath(A0, A0 + SWEEP, R), stroke: th.accent, 'stroke-width': 6, fill: 'none', 'stroke-linecap': 'round'});
  tach.appendChild(activeArc);
  ARCLEN = activeArc.getTotalLength();
  activeArc.setAttribute('stroke-dasharray', `0 ${ARCLEN}`);
  for (let v = 0; v <= gg.max; v += gg.step){
    const deg = A0 + SWEEP * (v / gg.max);
    const col = v >= gg.red ? th.red : th.tick;
    const [x1, y1] = polar(deg, R - 12), [x2, y2] = polar(deg, R - 4);
    tach.appendChild(el('line', {x1, y1, x2, y2, stroke: col, 'stroke-width': 2}));
    if (v % gg.labelEvery === 0){
      const [tx, ty] = polar(deg, R - 26);
      const t = el('text', {x: tx, y: ty + 4, 'text-anchor': 'middle', class: 'tick-label', fill: col});
      t.textContent = gg.fmt(v);
      tach.appendChild(t);
    }
  }
  needle = el('line', {x1: CX, y1: CY, x2: CX, y2: CY - 78, stroke: th.needle, 'stroke-width': 3, 'stroke-linecap': 'round'});
  tach.appendChild(needle);
  tach.appendChild(el('circle', {cx: CX, cy: CY, r: 7, fill: th.panel, stroke: th.dim, 'stroke-width': 2}));
  drawTach(0);
}
function drawTach(val){
  const n = Math.min(1, Math.max(0, val / G.max));
  const deg = A0 + SWEEP * n;
  const [x2, y2] = polar(deg, R - 22);
  const [x1, y1] = polar(deg + 180, 14);
  needle.setAttribute('x1', x1); needle.setAttribute('y1', y1);
  needle.setAttribute('x2', x2); needle.setAttribute('y2', y2);
  activeArc.setAttribute('stroke-dasharray', `${ARCLEN * n} ${ARCLEN}`);
}

/* ================= SIMULATION ================= */
let gear = 0, rpm = 750, shiftCut = 0, spool = 0, justShifted = false;
let speedTarget = 0, speedSm = 0, prevSpeed = 0, throttle = 0;

function stepSim(dt){
  const P = PRESETS[presetKey];
  speedSm += (speedTarget - speedSm) * Math.min(1, dt * 2.2);
  const accel = (speedSm - prevSpeed) / dt;
  prevSpeed = speedSm;
  const thrRaw = Math.min(1, Math.max(0.12, 0.16 + accel / 7));
  throttle += (thrRaw - throttle) * Math.min(1, dt * 4);

  const gb = P.gears;
  if (gb){
    let target = Math.max(gb.idle, speedSm * gb.ratios[gear]);
    if (target > gb.up && gear < gb.ratios.length - 1){
      gear++; shiftCut = gb.cut; justShifted = true;
      target = Math.max(gb.idle, speedSm * gb.ratios[gear]);
    } else if (gear > 0 && speedSm * gb.ratios[gear] < gb.down){
      gear--;
      target = Math.max(gb.idle, speedSm * gb.ratios[gear]);
    }
    shiftCut = Math.max(0, shiftCut - dt);
    rpm += (target - rpm) * Math.min(1, dt * (shiftCut > 0 ? 14 : gb.rate));
    rpm = Math.min(rpm, P.gauge.max);
  }
  const n = Math.min(1, speedSm / 150);
  const rate = n > spool ? (P.spoolUp || 1) : (P.spoolDown || 1.5);
  spool += (n - spool) * Math.min(1, dt * rate);
}

/* ================= GPS ================= */
let mode = 'demo', watchId = null, lastFix = null;
const statusEl = document.getElementById('status');
function setStatus(msg, err){ statusEl.textContent = msg || ''; statusEl.classList.toggle('err', !!err); }
function haversine(a, b){
  const R2 = 6371000, toR = Math.PI / 180;
  const dLat = (b.latitude - a.latitude) * toR, dLon = (b.longitude - a.longitude) * toR;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.latitude*toR) * Math.cos(b.latitude*toR) * Math.sin(dLon/2)**2;
  return 2 * R2 * Math.asin(Math.sqrt(s));
}
function startGPS(){
  if (!('geolocation' in navigator)){ setStatus('GPS ikke tilgængelig i denne browser', true); return; }
  if (!window.isSecureContext){ setStatus('GPS kræver HTTPS — læg filen på et website, eller brug demo', true); return; }
  setStatus('Venter på GPS…');
  watchId = navigator.geolocation.watchPosition(p => {
    const c = p.coords;
    if (c.speed != null && !isNaN(c.speed)) speedTarget = Math.max(0, c.speed * 3.6);
    else if (lastFix && (p.timestamp - lastFix.t) > 300 && (p.timestamp - lastFix.t) < 6000){
      const d = haversine(lastFix.c, c);
      speedTarget = Math.min(250, d / ((p.timestamp - lastFix.t) / 1000) * 3.6);
    }
    lastFix = {c: {latitude: c.latitude, longitude: c.longitude}, t: p.timestamp};
    setStatus(`GPS aktiv · ±${Math.round(c.accuracy)} m`);
  }, e => {
    setStatus(e.code === 1 ? 'GPS afvist — tillad placering i browseren' : 'Ingen GPS-signal', true);
  }, {enableHighAccuracy: true, maximumAge: 500, timeout: 12000});
}
function stopGPS(){
  if (watchId != null){ navigator.geolocation.clearWatch(watchId); watchId = null; }
  lastFix = null;
}

function startEngine(){
  ensureCtx();
  if (ctx.state !== 'running') ctx.resume();
  engine = PRESETS[presetKey].build(runGain);
  runGain.gain.cancelScheduledValues(ctx.currentTime);
  runGain.gain.setTargetAtTime(1, ctx.currentTime, 0.12);
}
function stopEngine(){
  if (!ctx || !engine) return;
  runGain.gain.cancelScheduledValues(ctx.currentTime);
  runGain.gain.setTargetAtTime(0, ctx.currentTime, 0.08);
  const old = engine; engine = null;
  setTimeout(() => old.teardown(), 450);
}
function swapPreset(key){
  presetKey = key;
  const P = PRESETS[key];
  gear = 0; rpm = P.gears ? P.gears.idle : 0; shiftCut = 0;
  applyTheme(key);
  if (running){ stopEngine(); startEngine(); }
}

    v.connect(vg); vg.connect(o.frequency);
    const og = mkGain(0.3); o.connect(og); og.connect(g);
    stops.push(o, v);

  ns.connect(bf); bf.connect(bg); bg.connect(g);
  g.gain.setTargetAtTime(0.35, ctx.currentTime, 0.05);
  whistle = {g, stops};
}

  setTimeout(() => w.stops.forEach(x => { try { x.stop(); } catch(e){} }), 600);
}

/* ================= STJERNEHIMMEL (warp) ================= */
const starCanvas = document.getElementById('stars');
const sctx = starCanvas.getContext('2d');
const stars = [];
for (let i = 0; i < 130; i++) stars.push({x: Math.random() - .5, y: Math.random() - .5, z: Math.random()});
function sizeStars(){ starCanvas.width = innerWidth; starCanvas.height = innerHeight; }
addEventListener('resize', sizeStars); sizeStars();
function drawStars(dt){
  const w = starCanvas.width, h = starCanvas.height;
  sctx.clearRect(0, 0, w, h);
  sctx.fillStyle = '#CBB8FF'; sctx.strokeStyle = '#8F6BFF';
  for (const s of stars){
    s.z -= dt * (0.04 + spool * 0.55);
    if (s.z <= 0.02){ s.z = 1; s.x = Math.random() - .5; s.y = Math.random() - .5; }
    const sx = w/2 + s.x / s.z * w * .5, sy = h/2 + s.y / s.z * h * .5;
    if (sx < 0 || sx > w || sy < 0 || sy > h) continue;
    const sz = (1 - s.z) * 2.2;
    if (spool > 0.15){
      const len = spool * 14 * (1 - s.z);
      const dx = sx - w/2, dy = sy - h/2, m = Math.hypot(dx, dy) || 1;
      sctx.globalAlpha = (1 - s.z) * .9;
      sctx.lineWidth = sz;
      sctx.beginPath(); sctx.moveTo(sx, sy); sctx.lineTo(sx - dx/m*len, sy - dy/m*len); sctx.stroke();
    } else {
      sctx.globalAlpha = (1 - s.z) * .9;
      sctx.beginPath(); sctx.arc(sx, sy, sz, 0, 7); sctx.fill();
    }
  }
  sctx.globalAlpha = 1;
}

document.getElementById('vol').addEventListener('input', e => {
  if (userGain) userGain.gain.setTargetAtTime(e.target.value / 100, ctx.currentTime, 0.05);
});
startBtn.addEventListener('click', () => {
  running = !running;
  startBtn.textContent = running ? 'STOP' : 'START';
  startBtn.classList.toggle('running', running);
  if (running){
    startEngine(); grabWakeLock();
    if (mode === 'gps') startGPS();
  } else {
    stopEngine(); stopGPS(); whistleOff();
    if (wakeLock){ wakeLock.release(); wakeLock = null; }
  }
});

/* ================= HOVEDLOOP ================= */
let lastT = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - lastT) / 1000) || 0.016;
  lastT = now;
  stepSim(dt);

  const P = PRESETS[presetKey];
  const thrEff = shiftCut > 0 ? throttle * 0.15 : throttle;

  let val = 0, sub = '';
  if (P.kind === 'engine'){
    val = Math.min(rpm, P.gauge.max);
    const gearTxt = speedSm < 1 ? 'N' : (gear + 1);
    sub = `GEAR <b>${gearTxt}</b> · ${running ? Math.round(val) : 0} O/MIN`;
  } else if (P.kind === 'jet'){
    const pct = Math.round(25 + spool * 85);
    val = pct;
    const ab = engine && engine.getAB ? engine.getAB() : 0;
    sub = `N1 <b>${running ? pct : 0}%</b>${ab > 0.5 ? ' · <b>AFTERBURNER</b>' : ''}`;
    abBadge.classList.toggle('on', ab > 0.5);
  } else if (P.kind === 'damp'){
    const bar = 0.8 + spool * 8.6;
    val = bar;
    sub = `KEDELTRYK <b>${running ? bar.toFixed(1) : '0.0'}</b> BAR`;
  } else {
    const wf = spool * 10;
    val = wf;
    sub = `WARP <b>${running ? wf.toFixed(1) : '0.0'}</b>`;
  }

  if (engine) engine.update({rpm, thr: thrEff, spool, dt, shifted: justShifted, speed: speedSm});
  justShifted = false;

  drawTach(running ? val : 0);
  speedEl.textContent = Math.round(speedSm);
  subEl.innerHTML = sub;

  // F1 shift lights
  if (presetKey === 'f1'){
    const lit = running ? Math.round(Math.min(1, Math.max(0, (rpm / P.gauge.red - 0.72) / 0.28)) * 8) : 0;
    shiftLEDs.forEach((d, i) => d.classList.toggle('on', i < lit));
  }
  // rally boost
  if (presetKey === 'rally' && engine && engine.getBoost)
    boostFill.style.width = (engine.getBoost() * 100).toFixed(0) + '%';
  // warp-stjerner
  if (presetKey === 'warp') drawStars(dt);

  requestAnimationFrame(loop);
}

applyTheme('mustang');
requestAnimationFrame(loop);
</script>
